bomdd:
  product: BomDD Library Lending Sample
  experiment: forward-01
  layer: Metrics

# 規律: raw 一致率単独で報告しない。全通過=「現固定オラクル被覆で未観測差分ゼロ」と表現。

metric_runs:
  - loop: forward-01
    factory: factory-01(opus)
    bom_rev: rev1(tag forward-01-input-bom)
    oracle_ref: bomdd/41-fixed-oracle.yaml@forward-01-input-bom(S01-S20)
    raw_match: 20/20
    blocker_diffs: 0
    new_unspecified_diffs: 0          # 固定層に unspecified_bom_residue なし
    specified_contract_miss: 0
    exploratory_variance_count: 3     # ID形式 / 応答小数秒 / message文面
    g3_dryrun_questions: 7
    note: 現固定オラクル被覆で未観測差分ゼロ。NFR median 5.9ms
  - loop: forward-01
    factory: factory-02(sonnet)
    bom_rev: rev1
    oracle_ref: 同上
    raw_match: 20/20
    blocker_diffs: 0
    new_unspecified_diffs: 0
    specified_contract_miss: 0
    exploratory_variance_count: 3
    note: 現固定オラクル被覆で未観測差分ゼロ。NFR median 5.6ms
  - loop: forward-01
    factory: factory-03(haiku)
    bom_rev: rev1
    oracle_ref: 同上
    raw_match: 6/20
    blocker_diffs: 1                  # 貸出エンドポイント実行時全滅(根本原因1件が14ケースに波及)
    new_unspecified_diffs: 0
    specified_contract_miss: 14       # 根本原因は1件(S05-S07/S10 fail + S11-S20 シード不能)
    exploratory_variance_count: 2
    note: 工場能力(自己受入17/17緑のままAPI表面欠陥=CHEAT-F01-P002)。BOM起因の差分ではない

exploratory_variance:                  # 合否非混在(分散の観測のみ)
  - dimension: ID 形式(P-01)
    values: { opus: 'GUID("N")32桁hex', sonnet: 'GUID(no-hyphen)32桁hex', haiku: '10桁ゼロパディング連番(静的カウンタ)' }
  - dimension: 応答日時の小数秒(P-02)
    values: { opus: '秒精度に正規化(0桁)', sonnet: '0桁に正規化', haiku: '7桁(DateTime.ToString("O"))' }
  - dimension: 追加応答フィールド(P-03)
    values: { opus: なし, sonnet: なし, haiku: 観測不能(貸出応答が常時エラー) }
  - dimension: エラー message 文面(P-04)
    values: { opus: '固定英短文', sonnet: '英文+ピリオド', haiku: '英文(大文字開始)' }
  - dimension: 自己受入の被覆規模(参考)
    values: { opus: '24(+L3自主スモーク)', sonnet: '22', haiku: '17(必須範囲のみ)' }

  # --- rev2(オラクル v2 = S01-S23, tag forward-01-rev2-input-bom) ---
  - loop: forward-01-rev2
    factory: factory-04(opus, fresh)
    bom_rev: rev2
    oracle_ref: bomdd/41-fixed-oracle.yaml@forward-01-rev2-input-bom(S01-S23)
    raw_match: 23/23
    targeted_fix_success: 1/1        # S23(空文字=400)が fresh で消えた=修正は BOM に宿った
    blocker_diffs: 0
    new_unspecified_diffs: 0
    specified_contract_miss: 0
    note: 現固定オラクル被覆で未観測差分ゼロ。自己受入 25/25(unit 19+L1スモーク6)
  - loop: forward-01-rev2
    factory: factory-05(sonnet, fresh)
    bom_rev: rev2
    oracle_ref: 同上
    raw_match: 23/23
    targeted_fix_success: 1/1
    blocker_diffs: 0
    new_unspecified_diffs: 0
    specified_contract_miss: 0
    note: 現固定オラクル被覆で未観測差分ゼロ。自己受入 41/41(unit 34+L1スモーク7)
  - loop: forward-01-rev2
    factory: factory-06(haiku, 別測定 haiku-retry)
    bom_rev: rev2
    oracle_ref: 同上
    raw_match: 19/23
    blocker_diffs: 1                 # 根本原因1件: ローカルTZ(JST)混入(+9hシフト)→ S05/S11/S16/S22 に波及
    new_unspecified_diffs: 0
    specified_contract_miss: 4
    note: K-UTC が明記した「TZ変換の罠」を踏む=工場能力。ただし v1 と異なり test_vectors が自己受入で捕捉済(13/16赤のまま納品=納品条件違反を正直申告)。L1スモーク 6/6=v1の故障クラス(API表面死)は消滅

  # --- forward-01.5(ECO-001 部分再製造。oracle v3 = S01-S25 + migration M01-M04) ---
  - loop: forward-015
    factory: factory-eco-01(opus, fresh, v0.2ソース改修)
    bom_rev: rev3(tag forward-015-input)
    raw_match: '25/25 + migration 4/4'
    regression: 0
    change_miss: 0
    data_preservation_miss: 0
    unnecessary_modification: 0
    note: 自己受入34/34。移行=user_version+ALTER。使い捨て検証プロジェクトで移行を自己検証後に削除
  - loop: forward-015
    factory: factory-eco-02(sonnet, fresh, v0.2ソース改修)
    bom_rev: rev3
    raw_match: '25/25 + migration 4/4'
    regression: 0
    change_miss: 0
    data_preservation_miss: 0
    unnecessary_modification: 0
    note: 自己受入31/31。移行方式が opus と独立に一致(user_version+ALTER=K-BOM の一意化効果)

  # --- forward-02(ECO-002 部分再製造。oracle v4 = S01-S28 + effectivity E01-E04 + migration 回帰) ---
  - loop: forward-02
    factory: factory-eco2-01(opus, fresh, v0.3ソース改修)
    bom_rev: rev4(tag forward-02-input)
    raw_match: '28/28 + effectivity 4/4 + migration 4/4'
    regression: 0
    change_miss: 0
    data_preservation_miss: 0
    effectivity_violation: 0
    unnecessary_modification: 0
    impact_prediction: "under-inclusion 1(Program.cs 配線1行=事前申告つき)/ over-inclusion 0。E-BOM 粒度予測(E-DUE-FINE-001 のみ=1/12)は的中・外れは品目→unit 写像(実装が1品目を unit 横断に分布)"
    note: 自己受入37/37。採用個体(v0.4)。ハーネスの Debug/Release 構成不一致を検出・申告(既存債務・ECO 外)
  - loop: forward-02
    factory: factory-eco2-02(sonnet, fresh, v0.3ソース改修)
    bom_rev: rev4
    raw_match: '28/28 + effectivity 4/4 + migration 4/4'
    regression: 0
    change_miss: 0
    data_preservation_miss: 0
    effectivity_violation: 0
    unnecessary_modification: 0
    impact_prediction: "under-inclusion の同一1行に独立収束(Program.cs diff は opus と blob 同一)= 取りこぼしは工場でなく影響分析に宿る"
    note: 自己受入37/37。Core 側の定数命名は opus と分岐(BOM 未指定次元の裁量分散・挙動同一)

process_metrics:
  g2_readers: 3(opus/sonnet/haiku)
  g2_ambiguity_findings: { opus: 17, sonnet: 13, haiku: 17, 共通指摘: 6 }
  g3_questions: { blocker: 1, friction: 5, minor: 1, 補正後残: 0 }
  kbom_pre_extraction: 実施(分岐候補 40+ 件を事前列挙→固定/explor./scope外に裁定)
  convergence_loops_needed: 0          # opus/sonnet が rev1 で 0 差分(webapi の 2→3→0 と対照的に初回 0)
  harness_cheats: 2(CHEAT-F01-H001 DateKind / CHEAT-F01-H002 変数名大小非区別=**セルフテストが凍結前に捕捉**)+ 頑健化1
  process_cheats: 2(P001 G2再監査省略 / P002 自己受入範囲の盲点→rev2でL1スモーク必須化により対策)
  rev2_observations:
    - S23 の v1製品 FAIL → rev2 fresh 製品 PASS(2/2)= 仕様昇格はコーチングでなく BOM に宿った
    - 治具セルフテスト初回実施で実バグ(H002)捕捉。v1判定は再採点で妥当性確認(opus/sonnet S01-S20 全PASS)
    - haiku の故障モードが「自己に不可視(v1: 自己受入緑+API死)」→「可視だが未修正(rev2: 13/16赤を申告して納品)」へ移行=L1スモーク+test_vectors の観測性向上
