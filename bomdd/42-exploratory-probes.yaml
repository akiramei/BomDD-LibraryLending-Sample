bomdd:
  product: BomDD Library Lending Sample
  experiment: forward-01
  layer: Exploratory Probes   # ★設計者のみ。合否を出さない(分散の観測のみ)

# oracle/fixed-oracle.ps1 が同一実行内で record-only 収集する(結果 JSON の probes 節)。
# 固定オラクルの合否には一切混ぜない。

exploratory_probes:
  - id: P-01
    dimension: ID 形式(接頭辞以降のアルゴリズム・長さ)
    status: promoted-to-oracle(rev2 → S21。forward-01 の分散をユーザー裁定で固定)
  - id: P-02
    dimension: 応答日時の小数秒桁・正規化
    status: promoted-to-oracle(rev2 → S22)
  - id: P-03
    dimension: 仕様列挙外の追加応答フィールド
    sweep_ref: silence_sweep「応答フィールド集合」
    method: S01/S05/S11 応答のキー集合から仕様列挙分を引いた残差を記録
  - id: P-04
    dimension: エラー message の文面方針
    method: S03/S04 の message を記録(非空のみ合否、内容は観測)
  - id: P-05
    dimension: SQLite ファイルの内部構造(参考)
    method: 実行後の DB ファイルのテーブル名一覧を記録(sqlite3 不要なら省略可。合否外)
